<!DOCTYPE html>
<html>

<head>

    <title>Sales Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            margin: 0;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #111827;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h3 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #d1d5db;
            padding: 15px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .stock-box{
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    padding: 8px 14px;
    border-radius: 10px;
    width: fit-content;
    font-weight: 600;
    color: #343a40;
}
.low-stock{
    background: #f1f3f5;
}

.logout-btn {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}

.logout-btn:hover {
    background-color: #c0392b;
}

    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar"><p style="color:white; padding-left:20px;">
    Role: {{ session.role }}
</p>

<!-- Dashboard -->

<a href="/dashboard">
    Dashboard
</a>

<!-- Manager Only -->

{% if session.role == "manager" %}

<a href="/employees">
    Employees
</a>

<a href="/products">
    Products
</a>

<a href="/sales-report">
    Sales Report
</a>
<a href="/stock-assignment">
    Stock Assignment
</a>

{% endif %}

<!-- Sales Rep Only -->

{% if session.role == "sales_rep" %}

<a href="/add-sale">
    Add Sale
</a>

<a href="/my-sales">
    My Sales
</a>
<a href="/my-stock">
    My Stock
</a>

{% endif %}

<!-- Logout -->

<a href="/logout">
    Logout
</a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        {% block content %}

        {% endblock %}

    </div>

</body>
</html>

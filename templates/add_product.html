{% extends "layout.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="mb-4">
        Add Product
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Product Name</label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Price</label>

            <input
                type="number"
                step="0.01"
                name="price"
                class="form-control"
                required>

        </div>

        <button class="btn btn-dark">
            Save Product
        </button>

    </form>

</div>

{% endblock %}

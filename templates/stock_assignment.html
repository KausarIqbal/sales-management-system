{% extends "layout.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="mb-4">
        Stock Assignment
    </h2>

    <form method="POST">

        <div class="row">

            <div class="col-md-4">

                <label>Sales Rep</label>

                <select
                    name="employee_id"
                    class="form-control"
                    required>

                    {% for employee in employees %}

                    <option value="{{ employee.employee_id }}">
                        {{ employee.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-4">

                <label>Product</label>

                <select
                    name="product_id"
                    class="form-control"
                    required>

                    {% for product in products %}

                    <option value="{{ product.product_id }}">
                        {{ product.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-4">

                <label>Quantity</label>

                <input
                    type="number"
                    name="quantity"
                    class="form-control"
                    required>

            </div>

        </div>

        <button
            class="btn btn-dark mt-3">

            Assign Stock

        </button>

    </form>

</div>

<br>

<div class="card p-4">

    <h3 class="mb-3">
        Assignment History
    </h3>

    <table class="table table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Sales Rep</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Date</th>

            </tr>

        </thead>

        <tbody>

            {% for item in assignments %}

            <tr>

                <td>{{ item.assignment_id }}</td>

                <td>{{ item.employee_name }}</td>

                <td>{{ item.product_name }}</td>

                <td>{{ item.quantity_assigned }}</td>

                <td>{{ item.date }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}

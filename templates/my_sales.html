{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card p-4">

        <h2 class="mb-4">
            My Sales
        </h2>

        <table class="table table-hover">

            <thead class="table-dark">

                <tr>
                    <th>Sale ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total Amount</th>
                </tr>

            </thead>

            <tbody>

                {% for sale in sales %}

                <tr>

                    <td>{{ sale.sale_id }}</td>

                    <td>{{ sale.customer }}</td>

                    <td>{{ sale.date }}</td>

                    <td>{{ sale.total_amount }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
<a href="/my-sales">
    My Sales
</a>

{% extends "layout.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="mb-4">
        My Assigned Stock
    </h2>

    <table class="table table-hover">

        <thead class="table-dark">

            <tr>

                <th>Product</th>
                <th>Assigned Quantity</th>

            </tr>

        </thead>

        <tbody>

            {% for item in stock %}

            <tr>

                <td>{{ item.product_name }}</td>

                <td>{{ item.assigned_stock }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}

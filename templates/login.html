<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f5f7fa;
        }

        .login-card{
            width: 400px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

    </style>

</head>

<body>

    <div class="login-card">

        <h2 class="mb-4 text-center">
            Sales Management Login
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>Username</label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >

            </div>

            <button class="btn btn-dark w-100">
                Login
            </button>

        </form>

    </div>

</body>

</html>

{% extends "layout.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="mb-4">
        Edit Product
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>
                Product Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ product.name }}"
                required>

        </div>

        <div class="mb-3">

            <label>
                Price
            </label>

            <input
                type="number"
                step="0.01"
                name="price"
                class="form-control"
                value="{{ product.price }}"
                required>

        </div>

        <button class="btn btn-primary">
            Update Product
        </button>

        <a href="/products"
           class="btn btn-secondary">
           Cancel
        </a>

    </form>

</div>

{% endblock %}

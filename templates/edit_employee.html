{% extends "layout.html" %}

{% block content %}

<div class="card p-4">

    <h2 class="mb-4">
        Edit Employee
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Name</label>

            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ employee.name }}"
                required>

        </div>

        <div class="mb-3">

            <label>Role</label>

            <select
                name="role"
                class="form-control">

                <option value="manager"
                {% if employee.role == "manager" %}selected{% endif %}>
                Manager
                </option>

                <option value="sales_rep"
                {% if employee.role == "sales_rep" %}selected{% endif %}>
                Sales Rep
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Username</label>

            <input
                type="text"
                name="username"
                class="form-control"
                value="{{ employee.username }}"
                required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                type="text"
                name="password"
                class="form-control"
                value="{{ employee.password }}"
                required>

        </div>

        <button class="btn btn-primary">
            Update Employee
        </button>

    </form>

</div>


{% endblock %}
